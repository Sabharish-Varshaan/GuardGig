<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050A14" />
    <title>GuardGig Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #102444, #050a14 60%);
        color: #e8f4fd;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 460px;
        text-align: center;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.7rem;
      }
      p {
        margin: 0;
        opacity: 0.85;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>GuardGig is not connected right now. Reconnect to sync trigger checks, claims, and policy updates.</p>
    </main>
  </body>
</html>
