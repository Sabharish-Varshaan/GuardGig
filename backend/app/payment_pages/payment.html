<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GuardGig Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(140deg, #041325, #0a2f4f);
        color: #e8f0ff;
      }
      .card {
        width: min(440px, 92vw);
        border-radius: 16px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 6px 0; color: #c9dcf7; }
      button {
        margin-top: 16px;
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
        background: #66d7ff;
        color: #08213d;
      }
      #status { margin-top: 12px; font-size: 14px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>GuardGig Premium Payment</h1>
      <p id="order"></p>
      <p id="amount"></p>
      <button id="pay-now">Open Razorpay Checkout</button>
      <p id="status">Preparing checkout...</p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order_id') || '';
      const amount = Number(params.get('amount') || 0);
      const currency = params.get('currency') || 'INR';
      const keyId = params.get('key_id') || '';

      const statusNode = document.getElementById('status');
      const orderNode = document.getElementById('order');
      const amountNode = document.getElementById('amount');

      orderNode.textContent = `Order: ${orderId || 'N/A'}`;
      amountNode.textContent = `Amount: ₹${(amount / 100).toFixed(2)}`;

      const successBase = '/payment-pages/success.html';
      const failureBase = '/payment-pages/failure.html';

      const failAndRedirect = (message) => {
        statusNode.textContent = message;
        const failureUrl = `${failureBase}?reason=${encodeURIComponent(message)}&order_id=${encodeURIComponent(orderId)}`;
        window.location.href = failureUrl;
      };

      if (!orderId || !amount || !keyId) {
        failAndRedirect('Missing checkout parameters');
      }

      const options = {
        key: keyId,
        amount,
        currency,
        name: 'GuardGig',
        description: 'Weekly premium payment',
        order_id: orderId,
        handler: function (response) {
          const paymentId = encodeURIComponent(response.razorpay_payment_id || '');
          const returnedOrderId = encodeURIComponent(response.razorpay_order_id || orderId);
          const signature = encodeURIComponent(response.razorpay_signature || '');
          const successUrl = `${successBase}?order_id=${returnedOrderId}&payment_id=${paymentId}&signature=${signature}`;
          window.location.href = successUrl;
        },
        modal: {
          ondismiss: function () {
            failAndRedirect('Payment cancelled');
          }
        }
      };

      document.getElementById('pay-now').addEventListener('click', function () {
        statusNode.textContent = 'Opening Razorpay checkout...';
        const rzp = new Razorpay(options);
        rzp.on('payment.failed', function () {
          failAndRedirect('Payment failed');
        });
        rzp.open();
      });

      setTimeout(() => {
        document.getElementById('pay-now').click();
      }, 250);
    </script>
  </body>
</html>
